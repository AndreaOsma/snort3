name: Snort3 Windows Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Snort3
        uses: actions/checkout@v4

      - name: Install Build Tools (Flex & Bison)
        run: |
          # Instalamos winflexbison vía Chocolatey (más fiable en Runners)
          choco install winflexbison3 --limit-output
          # Añadimos la ruta al PATH para que CMake lo encuentre como "flex" y "bison"
          echo "C:\ProgramData\chocolatey\lib\winflexbison3\tools" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Libraries with VCPKG
        run: |
          $vcpkgPath = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          # Aquí instalamos solo las librerías pesadas
          & $vcpkgPath install luajit pcre2 openssl hwloc zlib libpcap --triplet x64-windows
        shell: pwsh

      - name: Build LibDAQ
        run: |
          git clone --depth 1 https://github.com/snort3/libdaq.git
          cd libdaq
          mkdir build; cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_INSTALL_PREFIX="../../daq_install"
          cmake --build . --config Release --target install
        shell: pwsh

      - name: Configure and Build Snort3
        run: |
          mkdir build_snort; cd build_snort
          # Forzamos a CMake a ver el Flex/Bison de Chocolatey si fuera necesario
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DDAQ_INCLUDE_DIR="../daq_install/include" `
            -DDAQ_LIBRARIES_DIR="../daq_install/lib" `
            -DENABLE_STATIC_DAQ=ON
          cmake --build . --config Release
        shell: pwsh

      - name: Collect Artifacts
        run: |
          mkdir dist
          copy build_snort\src\Release\snort.exe dist\
          # Copiamos las DLLs de las librerías instaladas por vcpkg
          # Nota: la ruta vcpkg_installed se crea en la raíz del checkout
          copy vcpkg_installed\x64-windows\bin\*.dll dist\
        shell: pwsh

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: snort3-windows-binaries
          path: dist/
