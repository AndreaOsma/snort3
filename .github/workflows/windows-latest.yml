name: Snort3 Windows Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Snort3
        uses: actions/checkout@v4

      - name: Install Dependencies with VCPKG
        run: |
          # Usamos la ruta predefinida en los runners de GitHub
          $vcpkgPath = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          & $vcpkgPath install luajit pcre2 openssl hwloc zlib winflexbison libpcap --triplet x64-windows
        shell: pwsh

      - name: Build LibDAQ
        run: |
          git clone --depth 1 https://github.com/snort3/libdaq.git
          cd libdaq
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_INSTALL_PREFIX="../../daq_install"
          cmake --build . --config Release --target install
        shell: pwsh

      - name: Configure and Build Snort3
        run: |
          mkdir build_snort
          cd build_snort
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DDAQ_INCLUDE_DIR="../daq_install/include" `
            -DDAQ_LIBRARIES_DIR="../daq_install/lib" `
            -DENABLE_STATIC_DAQ=ON
          cmake --build . --config Release
        shell: pwsh

      - name: Collect Binaries and DLLs
        run: |
          mkdir dist
          copy build_snort\src\Release\snort.exe dist\
          # Recolectamos las DLLs que Snort necesitará para arrancar
          copy vcpkg_installed\x64-windows\bin\*.dll dist\
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snort3-windows-x64
          path: dist/
