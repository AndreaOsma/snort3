name: Snort3 Windows Build (MSYS2)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        # Ejecutamos todo dentro del entorno Bash de MSYS2
        shell: msys2 {0}

    steps:
      - name: Checkout Snort3
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- 1. CONFIGURACIÓN DEL ENTORNO MSYS2 ---
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            autotools
            autoconf
            automake
            libtool
            pkgconf
            flex
            bison
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libpcap
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-hwloc
            mingw-w64-ucrt-x86_64-luajit

      # --- 2. COMPILAR LIBDAQ (Autotools) ---
      - name: Build LibDAQ
        run: |
          # Activamos fail-fast nativo de bash
          set -e
          
          echo ">>> Clonando LibDAQ..."
          rm -rf libdaq
          git clone --depth 1 https://github.com/snort3/libdaq.git
          cd libdaq
          
          echo ">>> Ejecutando Autotools..."
          ./bootstrap
          ./configure --prefix=/usr/local/daq
          
          echo ">>> Compilando e instalando..."
          make -j$(nproc)
          make install
          cd ..

      # --- 3. COMPILAR SNORT 3 (CMake + Ninja) ---
      - name: Configure and Build Snort3
        run: |
          set -e
          rm -rf build_snort
          
          # PKG_CONFIG_PATH es vital para que CMake encuentre el LibDAQ compilado
          export PKG_CONFIG_PATH=/usr/local/daq/lib/pkgconfig:$PKG_CONFIG_PATH
          
          echo ">>> Configurando Snort 3..."
          cmake -G "Ninja" -S . -B build_snort \
            -DCMAKE_BUILD_TYPE=Release \
            -DDAQ_INCLUDE_DIR=/usr/local/daq/include \
            -DDAQ_LIBRARIES_DIR=/usr/local/daq/lib \
            -DENABLE_STATIC_DAQ=ON
            
          echo ">>> Compilando Snort 3..."
          cmake --build build_snort -j$(nproc)

      # --- 4. EMPAQUETADO ---
      - name: Collect Artifacts
        run: |
          set -e
          mkdir -p dist
          
          cp build_snort/src/snort.exe dist/
          
          # [Inferencia] Copiamos las dependencias dinámicas base al directorio final. 
          # Nota: Que esta copia manual de DLLs permita la ejecución portable de snort.exe 
          # en un Windows limpio es el comportamiento esperado, no garantizado.
          cp /ucrt64/bin/libpcap*.dll dist/ || true
          cp /ucrt64/bin/libpcre2*.dll dist/ || true
          cp /ucrt64/bin/libcrypto*.dll dist/ || true
          cp /ucrt64/bin/libssl*.dll dist/ || true
          cp /ucrt64/bin/zlib*.dll dist/ || true
          cp /ucrt64/bin/libhwloc*.dll dist/ || true
          cp /ucrt64/bin/lua*.dll dist/ || true
          cp /ucrt64/bin/libgcc_s_seh-1.dll dist/ || true
          cp /ucrt64/bin/libstdc++-6.dll dist/ || true
          cp /ucrt64/bin/libwinpthread-1.dll dist/ || true
          
          if [ -d "lua" ]; then
            cp -r lua/* dist/
          fi

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: snort3-windows-ucrt64-binaries
          path: dist/
