name: Snort3 Windows Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Snort3
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- 1. ACTIVAR CACHÉ (Para no esperar otros 20 min) ---
      - name: Cache VCPKG
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
          key: ${{ runner.os }}-vcpkg-snort3-v1

      - name: Install Tools (Flex/Bison/Ninja)
        run: |
          # Instalamos winflexbison3 y Ninja para máxima velocidad y compatibilidad
          choco install winflexbison3 ninja --limit-output
          echo "C:\ProgramData\chocolatey\lib\winflexbison3\tools" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Dependencies (VCPKG)
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
          # Instalamos solo las librerías necesarias
          & $vcpkg install luajit pcre2 openssl hwloc zlib libpcap --triplet x64-windows
        shell: pwsh

      # --- 2. COMPILAR LIBDAQ (Limpio y robusto) ---
      - name: Build LibDAQ
        run: |
          # Limpiamos rastro de clones anteriores si existen
          if (Test-Path libdaq) { Remove-Item -Recurse -Force libdaq }
          git clone --depth 1 https://github.com/snort3/libdaq.git
          
          # Configuramos usando Ninja (más fiable en CI)
          cmake -G "Ninja" -S libdaq -B libdaq/build `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_INSTALL_PREFIX="$((Get-Location).Path)/daq_install" `
            -DCMAKE_BUILD_TYPE=Release
          
          # Compilamos e instalamos
          cmake --build libdaq/build
          cmake --install libdaq/build
        shell: pwsh

      # --- 3. COMPILAR SNORT 3 ---
      - name: Configure and Build Snort3
        run: |
          if (Test-Path build_snort) { Remove-Item -Recurse -Force build_snort }
          
          cmake -G "Ninja" -S . -B build_snort `
            -DCMAKE_TOOLCHAIN_FILE="$($env:VCPKG_INSTALLATION_ROOT)/scripts/buildsystems/vcpkg.cmake" `
            -DDAQ_INCLUDE_DIR="$((Get-Location).Path)/daq_install/include" `
            -DDAQ_LIBRARIES_DIR="$((Get-Location).Path)/daq_install/lib" `
            -DENABLE_STATIC_DAQ=ON `
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build_snort
        shell: pwsh

      # --- 4. EMPAQUETADO ---
      - name: Collect Artifacts
        run: |
          New-Item -ItemType Directory -Path dist
          copy build_snort\src\snort.exe dist\
          # Copiamos las DLLs desde la ruta real de vcpkg en el runner
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          copy "$vcpkgBin\*.dll" dist\
          # Incluimos archivos LUA básicos para que Snort pueda arrancar
          if (Test-Path "lua") { copy "lua\*.lua" dist\ }
        shell: pwsh

      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: snort3-windows-x64-binaries
          path: dist/
